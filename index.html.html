<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniqGuest — Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Outfit', sans-serif; background: #F5F7FA; }
  button { font-family: 'Outfit', sans-serif; }
  input, textarea { font-family: 'Outfit', sans-serif; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const C = {
  primary: "#0D6E6E", primaryLight: "#14919B", primaryDark: "#094B4B",
  accent: "#FF6B35", danger: "#E53935", warning: "#F9A825", success: "#43A047",
  bg: "#F5F7FA", card: "#FFFFFF", text: "#1A2138", textLight: "#6B7A99", border: "#E2E8F0",
};
const catIcons = { Cleanliness: "🧹", Noise: "🔊", Staff: "👤", Amenities: "🛠️", Food: "🍽️" };
const catFil = { Cleanliness: "Kalinisan", Noise: "Ingay", Staff: "Staff", Amenities: "Amenities", Food: "Pagkain" };
const statusCol = { New: C.danger, Acknowledged: C.warning, "In Progress": C.primaryLight, Resolved: C.success };

const issues = [
  { id:1, room:"204", category:"Cleanliness", rating:1, comment:"Bathroom floor is dirty and towels haven't been replaced.", time:"2 min ago", status:"New", dept:"Housekeeping", guest:"Anonymous" },
  { id:2, room:"118", category:"Noise", rating:2, comment:"Very loud construction noise from outside since 7am.", time:"8 min ago", status:"Acknowledged", dept:"Front Desk", guest:"Room 118" },
  { id:3, room:"305", category:"Amenities", rating:2, comment:"Air conditioning is not working. Room is very hot.", time:"15 min ago", status:"In Progress", dept:"Maintenance", guest:"Anonymous" },
  { id:4, room:"112", category:"Staff", rating:3, comment:"Front desk staff was a bit dismissive during check-in.", time:"32 min ago", status:"Resolved", dept:"Front Desk", guest:"Room 112" },
  { id:5, room:"201", category:"Food", rating:2, comment:"Breakfast buffet items were cold and not replenished.", time:"1 hr ago", status:"Resolved", dept:"Kitchen", guest:"Anonymous" },
  { id:6, room:"410", category:"Cleanliness", rating:1, comment:"Found hair in the bedsheets.", time:"1.5 hrs ago", status:"Resolved", dept:"Housekeeping", guest:"Room 410" },
];

function Stars({ v, onChange, sz }) {
  sz = sz || 32;
  return React.createElement("div", { style: { display: "flex", gap: 4 } },
    [1,2,3,4,5].map(s => React.createElement("span", { key: s, onClick: () => onChange && onChange(s), style: { cursor: onChange ? "pointer" : "default", fontSize: sz, color: s <= v ? "#F9A825" : "#D1D5DB", transition: "0.15s", userSelect: "none" } }, "★"))
  );
}
function Badge({ text, color }) {
  return React.createElement("span", { style: { display: "inline-block", padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 600, background: color + "18", color, letterSpacing: 0.3 } }, text);
}
function Btn({ children, onClick, variant, full, small, disabled }) {
  variant = variant || "primary";
  const s = { primary: { bg: C.primary, c: "#fff", b: "none" }, accent: { bg: C.accent, c: "#fff", b: "none" }, outline: { bg: "transparent", c: C.primary, b: "2px solid " + C.primary }, ghost: { bg: "transparent", c: C.textLight, b: "1px solid " + C.border } }[variant];
  return React.createElement("button", { disabled, onClick, style: { padding: small ? "8px 16px" : "12px 24px", borderRadius: 10, fontSize: small ? 13 : 15, fontWeight: 600, cursor: disabled ? "not-allowed" : "pointer", background: disabled ? "#ccc" : s.bg, color: s.c, border: s.b, width: full ? "100%" : "auto", transition: "0.2s", opacity: disabled ? 0.6 : 1 } }, children);
}
function QRCode({ size }) {
  size = size || 60;
  return React.createElement("svg", { width: size, height: size, viewBox: "0 0 60 60" },
    React.createElement("rect", { x: 0, y: 0, width: 20, height: 20, rx: 3, fill: C.primaryDark }),
    React.createElement("rect", { x: 3, y: 3, width: 14, height: 14, rx: 1.5, fill: "#fff" }),
    React.createElement("rect", { x: 6, y: 6, width: 8, height: 8, rx: 1, fill: C.primaryDark }),
    React.createElement("rect", { x: 40, y: 0, width: 20, height: 20, rx: 3, fill: C.primaryDark }),
    React.createElement("rect", { x: 43, y: 3, width: 14, height: 14, rx: 1.5, fill: "#fff" }),
    React.createElement("rect", { x: 46, y: 6, width: 8, height: 8, rx: 1, fill: C.primaryDark }),
    React.createElement("rect", { x: 0, y: 40, width: 20, height: 20, rx: 3, fill: C.primaryDark }),
    React.createElement("rect", { x: 3, y: 43, width: 14, height: 14, rx: 1.5, fill: "#fff" }),
    React.createElement("rect", { x: 6, y: 46, width: 8, height: 8, rx: 1, fill: C.primaryDark }),
    React.createElement("rect", { x: 24, y: 24, width: 12, height: 12, rx: 2, fill: C.primary }),
    React.createElement("rect", { x: 40, y: 40, width: 8, height: 8, rx: 2, fill: C.primaryDark }),
    React.createElement("rect", { x: 52, y: 40, width: 8, height: 8, fill: C.primary }),
    React.createElement("rect", { x: 40, y: 52, width: 8, height: 8, fill: C.primary }),
    React.createElement("rect", { x: 52, y: 52, width: 8, height: 8, rx: 2, fill: C.primaryDark }),
    React.createElement("rect", { x: 24, y: 0, width: 4, height: 4, fill: C.primary }),
    React.createElement("rect", { x: 32, y: 8, width: 4, height: 4, fill: C.primary }),
    React.createElement("rect", { x: 0, y: 28, width: 4, height: 4, fill: C.primary }),
    React.createElement("rect", { x: 28, y: 40, width: 4, height: 8, fill: C.primary })
  );
}

function Phone({ children }) {
  return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"linear-gradient(135deg,"+C.primaryDark+","+C.primary+")",padding:20}}>
    <div style={{width:375,minHeight:640,background:C.card,borderRadius:32,boxShadow:"0 20px 60px rgba(0,0,0,0.3)",overflow:"hidden"}}>
      <div style={{height:28,background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:60,height:5,borderRadius:3,background:C.border}}/></div>
      <div style={{maxHeight:612,overflowY:"auto"}}>{children}</div>
    </div>
  </div>;
}

function Dash({ children, title, nav, onNav, onBack }) {
  const items = [{id:"feed",l:"Live Feed",i:"🔔"},{id:"sms",l:"SMS Preview",i:"💬"},{id:"analytics",l:"Analytics",i:"📊"},{id:"settings",l:"Settings",i:"⚙️"}];
  return <div style={{minHeight:"100vh",background:C.bg,paddingBottom:60}}>
    {nav && <div style={{background:C.card,borderBottom:"1px solid "+C.border,padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,"+C.primary+","+C.primaryLight+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#fff",fontWeight:700}}>UG</div>
        <span style={{fontSize:16,fontWeight:700,color:C.text}}>UniqGuest</span>
        <span style={{fontSize:11,color:C.textLight,background:C.bg,padding:"2px 8px",borderRadius:10}}>Seaside Inn</span>
      </div>
      <div style={{display:"flex",gap:2}}>{items.map(it => <span key={it.id} onClick={()=>onNav(it.id)} style={{padding:"8px 14px",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:nav===it.id?600:400,background:nav===it.id?C.primary+"12":"transparent",color:nav===it.id?C.primary:C.textLight,transition:"0.15s",whiteSpace:"nowrap"}}>{it.i} {it.l}</span>)}</div>
    </div>}
    <div style={{padding:24,maxWidth:960,margin:"0 auto"}}>
      {onBack && <span onClick={onBack} style={{cursor:"pointer",fontSize:14,color:C.primaryLight,display:"inline-block",marginBottom:12}}>← Back</span>}
      {title && <h2 style={{fontSize:22,fontWeight:700,color:C.text,margin:"0 0 20px"}}>{title}</h2>}
      {children}
    </div>
  </div>;
}

function GuestLanding({ onNext, lang, setLang }) {
  const [pulse, setPulse] = useState(true);
  useEffect(() => { const t = setInterval(() => setPulse(p => !p), 1200); return () => clearInterval(t); }, []);
  const f = lang === "fil";
  return <Phone><div style={{padding:"20px 24px 32px"}}>
    <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
      <div style={{display:"flex",background:C.bg,borderRadius:20,overflow:"hidden",border:"1px solid "+C.border}}>
        <span onClick={()=>setLang("en")} style={{padding:"4px 12px",fontSize:11,fontWeight:lang==="en"?700:400,cursor:"pointer",background:lang==="en"?C.primary:"transparent",color:lang==="en"?"#fff":C.textLight,transition:"0.15s"}}>EN</span>
        <span onClick={()=>setLang("fil")} style={{padding:"4px 12px",fontSize:11,fontWeight:lang==="fil"?700:400,cursor:"pointer",background:lang==="fil"?C.primary:"transparent",color:lang==="fil"?"#fff":C.textLight,transition:"0.15s"}}>FIL</span>
      </div>
    </div>
    <div style={{textAlign:"center",marginBottom:16}}>
      <div style={{width:68,height:68,borderRadius:"50%",background:"linear-gradient(135deg,"+C.primary+","+C.primaryLight+")",margin:"0 auto 14px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,color:"#fff",boxShadow:pulse?"0 0 0 8px rgba(13,110,110,0.15)":"0 0 0 0px rgba(13,110,110,0)",transition:"box-shadow 0.6s"}}>UG</div>
      <h1 style={{fontSize:22,fontWeight:700,color:C.text,margin:"0 0 4px"}}>{f?"Maligayang Pagdating":"Welcome to UniqGuest"}</h1>
      <p style={{color:C.textLight,fontSize:13,margin:0}}>{f?"Ang feedback mo ay makakatulong sa amin":"Your feedback helps us serve you better"}</p>
    </div>
    <div style={{background:C.bg,borderRadius:14,padding:14,marginBottom:16,textAlign:"center",border:"1px solid "+C.border}}>
      <div style={{display:"inline-block",padding:10,background:"#fff",borderRadius:8,marginBottom:6,boxShadow:pulse?"0 0 0 4px rgba(13,110,110,0.1)":"none",transition:"box-shadow 0.6s"}}><QRCode size={72}/></div>
      <p style={{fontSize:11,color:C.textLight,margin:0}}>{f?"Na-scan ang QR Code • Room 204":"QR Code Scanned • Room 204"}</p>
    </div>
    <div style={{background:"#fff",borderRadius:12,padding:14,marginBottom:16,border:"1px solid "+C.border}}>
      {[[f?"Hotel":"Hotel","Seaside Inn Moalboal"],[f?"Kwarto":"Room","204"],[f?"Lugar":"Area",f?"Kwarto ng Bisita":"Guest Room"]].map(([l,v])=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid "+C.bg}}><span style={{fontSize:13,color:C.textLight}}>{l}</span><span style={{fontSize:13,fontWeight:600,color:C.text}}>{v}</span></div>)}
    </div>
    <p style={{fontSize:11,color:C.textLight,textAlign:"center",marginBottom:14}}>{f?"Walang kailangang i-download. Hindi kailangan ng account.":"No app download needed. No account required."}</p>
    <Btn full onClick={onNext}>{f?"Ibahagi ang Karanasan Mo":"Share Your Experience"}</Btn>
  </div></Phone>;
}

function GuestFeedback({ onNext, onBack, lang }) {
  const [rating, setRating] = useState(0);
  const [cat, setCat] = useState("");
  const [comment, setComment] = useState("");
  const [anon, setAnon] = useState(true);
  const f = lang === "fil";
  return <Phone><div style={{padding:"16px 24px 32px"}}>
    <div style={{display:"flex",alignItems:"center",marginBottom:16}}><span onClick={onBack} style={{cursor:"pointer",fontSize:20,marginRight:12,color:C.textLight}}>←</span><h2 style={{fontSize:20,fontWeight:700,color:C.text,margin:0}}>{f?"Kumusta ang stay mo?":"How's your stay?"}</h2></div>
    <div style={{marginBottom:18}}>
      <label style={{fontSize:13,fontWeight:600,color:C.text,display:"block",marginBottom:6}}>{f?"Rating *":"Overall Rating *"}</label>
      <Stars v={rating} onChange={setRating} sz={38}/>
      {rating > 0 && rating <= 2 && <p style={{fontSize:11,color:C.danger,margin:"6px 0 0",fontWeight:500}}>⚡ {f?"Aabisuhan kaagad ang staff":"Staff will be notified immediately"}</p>}
      {rating >= 4 && <p style={{fontSize:11,color:C.success,margin:"6px 0 0"}}>😊 {f?"Salamat sa magandang feedback!":"Great to hear! Thank you!"}</p>}
    </div>
    <div style={{marginBottom:18}}>
      <label style={{fontSize:13,fontWeight:600,color:C.text,display:"block",marginBottom:6}}>{f?"Tungkol saan?":"What's this about?"} <span style={{fontWeight:400,color:C.textLight}}>(optional)</span></label>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {["Cleanliness","Noise","Staff","Amenities","Food"].map(c => <span key={c} onClick={()=>setCat(cat===c?"":c)} style={{padding:"7px 12px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:500,background:cat===c?C.primary:C.bg,color:cat===c?"#fff":C.text,border:"1px solid "+(cat===c?C.primary:C.border),transition:"0.15s"}}>{catIcons[c]} {f?catFil[c]:c}</span>)}
      </div>
    </div>
    <div style={{marginBottom:18}}>
      <label style={{fontSize:13,fontWeight:600,color:C.text,display:"block",marginBottom:6}}>{f?"Detalye":"Tell us more"} <span style={{fontWeight:400,color:C.textLight}}>(optional)</span></label>
      <textarea value={comment} onChange={e=>setComment(e.target.value)} placeholder={f?"Ano ang nangyari?":"What happened?"} rows={3} style={{width:"100%",padding:12,borderRadius:10,border:"1px solid "+C.border,fontSize:14,resize:"none"}}/>
    </div>
    <div style={{marginBottom:20,display:"flex",alignItems:"center",gap:10}}>
      <div onClick={()=>setAnon(!anon)} style={{width:20,height:20,borderRadius:4,border:"2px solid "+(anon?C.primary:C.border),background:anon?C.primary:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,flexShrink:0}}>{anon?"✓":""}</div>
      <span style={{fontSize:13,color:C.textLight}}>{f?"Mag-submit nang anonymous":"Submit anonymously"}</span>
    </div>
    <Btn full onClick={onNext} disabled={rating===0}>{f?"Isumite":"Submit Feedback"}</Btn>
    <p style={{fontSize:11,color:C.textLight,textAlign:"center",marginTop:8}}>{f?"Wala pang 60 segundo":"Takes less than 60 seconds"}</p>
  </div></Phone>;
}

function GuestConfirm({ onRestart, lang }) {
  const f = lang === "fil";
  return <Phone><div style={{padding:"48px 24px",textAlign:"center"}}>
    <div style={{width:80,height:80,borderRadius:"50%",background:C.success+"15",margin:"0 auto 20px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:40}}>✓</div>
    <h2 style={{fontSize:24,fontWeight:700,color:C.text,margin:"0 0 8px"}}>{f?"Salamat!":"Thank you!"}</h2>
    <p style={{color:C.textLight,fontSize:14,margin:"0 0 24px",lineHeight:1.6}}>{f?"Natanggap na ang feedback mo. Aabisuhan agad ang aming team.":"Your feedback has been received. Our team has been notified."}</p>
    <div style={{background:C.bg,borderRadius:12,padding:16,marginBottom:32,textAlign:"left"}}>
      <p style={{fontSize:12,color:C.textLight,margin:"0 0 4px"}}>Reference #UG-2026-0847</p>
      <p style={{fontSize:12,color:C.textLight,margin:0}}>May 16, 2026 • 2:34 PM</p>
    </div>
    <Btn variant="outline" full onClick={onRestart}>{f?"Mag-submit ulit":"Submit Another Feedback"}</Btn>
  </div></Phone>;
}

function StaffLogin({ onNext }) {
  return <Dash title=""><div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"70vh"}}>
    <div style={{width:380,padding:40,background:C.card,borderRadius:16,boxShadow:"0 4px 24px rgba(0,0,0,0.08)"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg,"+C.primary+","+C.primaryLight+")",margin:"0 auto 12px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,color:"#fff",fontWeight:700}}>UG</div>
        <h2 style={{fontSize:22,fontWeight:700,color:C.text,margin:"0 0 4px"}}>UniqGuest Dashboard</h2>
        <p style={{fontSize:13,color:C.textLight,margin:0}}>Sign in to manage guest feedback</p>
      </div>
      <div style={{marginBottom:16}}><label style={{fontSize:12,fontWeight:600,color:C.textLight,display:"block",marginBottom:6}}>Email</label><input defaultValue="eddie@seasideinn.ph" style={{width:"100%",padding:10,borderRadius:8,border:"1px solid "+C.border,fontSize:14}}/></div>
      <div style={{marginBottom:24}}><label style={{fontSize:12,fontWeight:600,color:C.textLight,display:"block",marginBottom:6}}>Password</label><input type="password" defaultValue="password123" style={{width:"100%",padding:10,borderRadius:8,border:"1px solid "+C.border,fontSize:14}}/></div>
      <Btn full onClick={onNext}>Sign In</Btn>
      <p style={{fontSize:11,color:C.textLight,textAlign:"center",marginTop:16}}>Seaside Inn Moalboal • Free Plan (22 rooms)</p>
    </div>
  </div></Dash>;
}

function SMSPreview({ onNav }) {
  const alerts = [
    { time:"2:34 PM", room:"204", rating:1, cat:"Cleanliness", msg:"Bathroom floor is dirty and towels haven't been replaced.", to:"Eddie Reyes (Owner)" },
    { time:"2:26 PM", room:"118", rating:2, cat:"Noise", msg:"Very loud construction noise from outside since 7am.", to:"Diane Santos (Front Desk)" },
    { time:"2:19 PM", room:"305", rating:2, cat:"Amenities", msg:"Air conditioning is not working. Room is very hot.", to:"Jun Magsino (Maintenance)" },
  ];
  return <Dash title="SMS / Push Alert Preview" nav="sms" onNav={onNav}>
    <p style={{fontSize:13,color:C.textLight,margin:"0 0 20px"}}>What staff receive when a guest submits low-rated feedback. Alerts sent instantly via SMS/push.</p>
    <div style={{maxWidth:500}}>{alerts.map((a,i) => <div key={i} style={{background:C.card,borderRadius:16,padding:20,marginBottom:16,border:"1px solid "+C.border}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:11,color:C.textLight}}>📱 SMS to: <b>{a.to}</b></span>
        <span style={{fontSize:11,color:C.textLight}}>{a.time}</span>
      </div>
      <div style={{background:C.bg,borderRadius:12,padding:14}}>
        <p style={{margin:0,fontSize:13,color:C.text,lineHeight:1.6}}>
          <span style={{fontWeight:700}}>⚠️ UniqGuest Alert</span><br/>
          <span style={{color:C.danger,fontWeight:600}}>Room {a.room} rated {a.rating}★ for {a.cat}</span><br/><br/>
          <span style={{fontStyle:"italic"}}>"{a.msg}"</span><br/><br/>
          <span style={{fontSize:12,color:C.primaryLight}}>👉 Tap to view: uniqguest.ph/issue/{a.room}</span>
        </p>
      </div>
      <div style={{display:"flex",gap:8,marginTop:12}}><Badge text={a.rating+"★"} color={C.danger}/><Badge text={a.cat} color={C.warning}/><Badge text="Instant" color={C.accent}/></div>
    </div>)}</div>
  </Dash>;
}

function LiveFeed({ onIssueClick, onNav }) {
  const active = issues.filter(i => i.status !== "Resolved");
  const resolved = issues.filter(i => i.status === "Resolved");
  return <Dash title="Live Feed" nav="feed" onNav={onNav}>
    <div style={{display:"flex",gap:14,marginBottom:24,flexWrap:"wrap"}}>
      {[{l:"New Alerts",v:1,c:C.danger,i:"🔔"},{l:"In Progress",v:2,c:C.warning,i:"⏳"},{l:"Resolved Today",v:3,c:C.success,i:"✓"},{l:"Avg. Satisfaction",v:"3.2★",c:C.primaryLight,i:"📊"}].map((s,i) => <div key={i} style={{flex:"1 1 140px",background:C.card,borderRadius:12,padding:16,borderLeft:"4px solid "+s.c}}><div style={{fontSize:12,color:C.textLight,marginBottom:4}}>{s.i} {s.l}</div><div style={{fontSize:24,fontWeight:700,color:s.c}}>{s.v}</div></div>)}
    </div>
    <h3 style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:12}}>Active Issues ({active.length})</h3>
    {active.map(iss => <div key={iss.id} onClick={()=>onIssueClick(iss)} style={{background:C.card,borderRadius:12,padding:16,marginBottom:10,cursor:"pointer",border:"1px solid "+C.border,display:"flex",gap:14,alignItems:"flex-start"}}>
      <div style={{fontSize:24,width:40,textAlign:"center",flexShrink:0}}>{catIcons[iss.category]}</div>
      <div style={{flex:1}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><span style={{fontWeight:600,fontSize:14,color:C.text}}>Room {iss.room} • {iss.category}</span><Badge text={iss.status} color={statusCol[iss.status]}/></div>
        <p style={{fontSize:13,color:C.textLight,margin:"0 0 6px",lineHeight:1.4}}>{iss.comment}</p>
        <div style={{display:"flex",gap:12,fontSize:11,color:C.textLight}}><span>⏱ {iss.time}</span><span>→ {iss.dept}</span><span>{"★".repeat(iss.rating)}{"☆".repeat(5-iss.rating)}</span></div>
      </div>
    </div>)}
    <h3 style={{fontSize:15,fontWeight:700,color:C.text,margin:"20px 0 12px"}}>Resolved Today ({resolved.length})</h3>
    {resolved.map(iss => <div key={iss.id} onClick={()=>onIssueClick(iss)} style={{background:C.card,borderRadius:12,padding:14,marginBottom:8,cursor:"pointer",border:"1px solid "+C.border,opacity:0.7,display:"flex",gap:14,alignItems:"center"}}>
      <span style={{fontSize:20}}>{catIcons[iss.category]}</span>
      <div style={{flex:1}}><span style={{fontWeight:600,fontSize:13,color:C.text}}>Room {iss.room} • {iss.category}</span><span style={{fontSize:11,color:C.success,marginLeft:8}}>✓ Resolved</span></div>
      <span style={{fontSize:11,color:C.textLight}}>{iss.time}</span>
    </div>)}
  </Dash>;
}

function IssueDetail({ issue, onBack, onNav }) {
  const [status, setStatus] = useState(issue.status);
  return <Dash title={"Room "+issue.room+" — "+issue.category} nav="feed" onNav={onNav} onBack={onBack}>
    <div style={{maxWidth:640}}>
      <div style={{background:C.card,borderRadius:12,padding:24,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h3 style={{margin:0,fontSize:18,color:C.text}}>{catIcons[issue.category]} {issue.category} Issue</h3><Badge text={status} color={statusCol[status]}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px 24px",marginBottom:16}}>
          <div><span style={{fontSize:11,color:C.textLight}}>Room</span><div style={{fontWeight:600,fontSize:14}}>{issue.room}</div></div>
          <div><span style={{fontSize:11,color:C.textLight}}>Rating</span><div><Stars v={issue.rating} sz={18}/></div></div>
          <div><span style={{fontSize:11,color:C.textLight}}>Department</span><div style={{fontWeight:600,fontSize:14}}>{issue.dept}</div></div>
          <div><span style={{fontSize:11,color:C.textLight}}>Submitted</span><div style={{fontWeight:600,fontSize:14}}>{issue.time}</div></div>
          <div><span style={{fontSize:11,color:C.textLight}}>Guest</span><div style={{fontWeight:600,fontSize:14}}>{issue.guest}</div></div>
        </div>
        <div style={{background:C.bg,borderRadius:8,padding:14}}><p style={{margin:0,fontSize:14,color:C.text,lineHeight:1.5,fontStyle:"italic"}}>"{issue.comment}"</p></div>
      </div>
      <div style={{background:C.card,borderRadius:12,padding:24,marginBottom:16}}>
        <h4 style={{margin:"0 0 12px",fontSize:15,color:C.text}}>Update Status</h4>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{["New","Acknowledged","In Progress","Resolved"].map(s => <span key={s} onClick={()=>setStatus(s)} style={{padding:"8px 16px",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:600,background:status===s?statusCol[s]:C.bg,color:status===s?"#fff":C.text,transition:"0.15s"}}>{s}</span>)}</div>
      </div>
      <div style={{background:C.card,borderRadius:12,padding:24}}>
        <h4 style={{margin:"0 0 12px",fontSize:15,color:C.text}}>Staff Notes</h4>
        <textarea placeholder="Add a note..." rows={3} style={{width:"100%",padding:12,borderRadius:8,border:"1px solid "+C.border,fontSize:13,resize:"none",marginBottom:12}}/>
        <Btn small>Save Note</Btn>
      </div>
    </div>
  </Dash>;
}

function AnalyticsScreen({ onNav }) {
  const catData = [{n:"Cleanliness",p:35,c:C.danger},{n:"Noise",p:20,c:C.warning},{n:"Staff",p:15,c:C.primaryLight},{n:"Amenities",p:18,c:C.accent},{n:"Food",p:12,c:C.success}];
  const deptData = [{n:"Housekeeping",t:"18 min",i:14,s:3.1},{n:"Front Desk",t:"8 min",i:9,s:3.8},{n:"Maintenance",t:"42 min",i:7,s:2.9},{n:"Kitchen",t:"12 min",i:5,s:3.5}];
  const trend = [3.8,3.5,3.2,3.6,3.9,4.1,3.8], labels = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const cW=380,cH=130,pL=30,pR=10,pT=10,pB=25,plW=cW-pL-pR,plH=cH-pT-pB,mn=2.5,mx=5;
  const pts = trend.map((v,i) => ({x:pL+(i/(trend.length-1))*plW, y:pT+plH-((v-mn)/(mx-mn))*plH}));
  const line = pts.map((p,i) => (i===0?"M":"L")+p.x+","+p.y).join(" ");

  return <Dash title="Analytics" nav="analytics" onNav={onNav}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
      <div style={{background:C.card,borderRadius:12,padding:20}}>
        <h4 style={{margin:"0 0 16px",fontSize:14,color:C.text}}>Satisfaction Trend (This Week)</h4>
        <svg width={cW} height={cH} style={{width:"100%",height:"auto"}} viewBox={"0 0 "+cW+" "+cH}>
          {[3,3.5,4,4.5].map(v => { const y=pT+plH-((v-mn)/(mx-mn))*plH; return <g key={v}><line x1={pL} y1={y} x2={cW-pR} y2={y} stroke={C.border} strokeWidth={0.5}/><text x={pL-4} y={y+3} textAnchor="end" fontSize={9} fill={C.textLight}>{v}</text></g>; })}
          <path d={line+" L"+pts[pts.length-1].x+","+(pT+plH)+" L"+pts[0].x+","+(pT+plH)+" Z"} fill={C.primary} opacity={0.08}/>
          <path d={line} fill="none" stroke={C.primary} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
          {pts.map((p,i) => <g key={i}><circle cx={p.x} cy={p.y} r={4} fill={C.card} stroke={C.primary} strokeWidth={2}/><text x={p.x} y={pT+plH+16} textAnchor="middle" fontSize={9} fill={C.textLight}>{labels[i]}</text><text x={p.x} y={p.y-10} textAnchor="middle" fontSize={9} fontWeight={600} fill={C.text}>{trend[i]}</text></g>)}
        </svg>
      </div>
      <div style={{background:C.card,borderRadius:12,padding:20}}>
        <h4 style={{margin:"0 0 16px",fontSize:14,color:C.text}}>Complaints by Category</h4>
        {catData.map(cat => <div key={cat.n} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{color:C.text}}>{catIcons[cat.n]} {cat.n}</span><span style={{fontWeight:600,color:cat.c}}>{cat.p}%</span></div><div style={{height:8,background:C.bg,borderRadius:4,overflow:"hidden"}}><div style={{width:cat.p+"%",height:"100%",background:cat.c,borderRadius:4}}/></div></div>)}
      </div>
    </div>
    <div style={{background:C.card,borderRadius:12,padding:20,marginBottom:16}}>
      <h4 style={{margin:"0 0 16px",fontSize:14,color:C.text}}>Department Performance</h4>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr style={{borderBottom:"2px solid "+C.border}}>{["Department","Open Issues","Avg. Resolution","Satisfaction"].map(h => <th key={h} style={{textAlign:"left",padding:"8px 12px",fontSize:12,color:C.textLight,fontWeight:600}}>{h}</th>)}</tr></thead>
      <tbody>{deptData.map(d => <tr key={d.n} style={{borderBottom:"1px solid "+C.border}}><td style={{padding:"10px 12px",fontWeight:600}}>{d.n}</td><td style={{padding:"10px 12px"}}>{d.i}</td><td style={{padding:"10px 12px"}}>{d.t}</td><td style={{padding:"10px 12px"}}><span style={{fontWeight:700,color:d.s>=3.5?C.success:d.s>=3?C.warning:C.danger}}>{d.s} ★</span></td></tr>)}</tbody></table>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16}}>
      {[{l:"Total Feedback (Month)",v:"47",s:"↑ 12% vs last month"},{l:"Avg. Resolution Time",v:"22 min",s:"↓ 8 min improvement"},{l:"Guest Satisfaction",v:"3.6 ★",s:"↑ 0.3 vs last month"}].map((s,i) => <div key={i} style={{background:C.card,borderRadius:12,padding:16,textAlign:"center"}}><div style={{fontSize:11,color:C.textLight,marginBottom:4}}>{s.l}</div><div style={{fontSize:28,fontWeight:700,color:C.primary}}>{s.v}</div><div style={{fontSize:11,color:C.success}}>{s.s}</div></div>)}
    </div>
  </Dash>;
}

function SettingsScreen({ onNav }) {
  return <Dash title="Settings" nav="settings" onNav={onNav}>
    <div style={{maxWidth:600}}>
      <div style={{background:C.card,borderRadius:12,padding:24,marginBottom:16}}>
        <h4 style={{margin:"0 0 16px",fontSize:15,color:C.text}}>Hotel Profile</h4>
        {[["Hotel Name","Seaside Inn Moalboal"],["Total Rooms","22"],["Plan","Free (up to 25 rooms)"],["Language","Filipino + English"]].map(([l,v]) => <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.border}}><span style={{fontSize:13,color:C.textLight}}>{l}</span><span style={{fontSize:13,fontWeight:600,color:C.text}}>{v}</span></div>)}
      </div>
      <div style={{background:C.card,borderRadius:12,padding:24,marginBottom:16}}>
        <h4 style={{margin:"0 0 12px",fontSize:15,color:C.text}}>Alert Thresholds</h4>
        <label style={{fontSize:12,color:C.textLight}}>Send instant alert when rating ≤</label>
        <div style={{display:"flex",gap:8,margin:"8px 0 16px"}}>{[1,2,3].map(n => <span key={n} style={{padding:"8px 20px",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",background:n===2?C.primary:C.bg,color:n===2?"#fff":C.text}}>{n} ★</span>)}</div>
        <label style={{fontSize:12,color:C.textLight}}>High-priority categories (frustrators):</label>
        <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
          {["Cleanliness","Noise"].map(c => <span key={c} style={{padding:"6px 14px",borderRadius:20,fontSize:12,background:C.danger+"15",color:C.danger,fontWeight:600}}>🔴 {c}</span>)}
          {["Staff","Amenities","Food"].map(c => <span key={c} style={{padding:"6px 14px",borderRadius:20,fontSize:12,background:C.bg,color:C.textLight}}>⚪ {c}</span>)}
        </div>
      </div>
      <div style={{background:C.card,borderRadius:12,padding:24,marginBottom:16}}>
        <h4 style={{margin:"0 0 12px",fontSize:15,color:C.text}}>Staff Accounts</h4>
        {[{n:"Eddie Reyes",r:"Owner / Admin",e:"eddie@seasideinn.ph"},{n:"Diane Santos",r:"Front Desk",e:"diane@seasideinn.ph"},{n:"Jun Magsino",r:"Housekeeping Lead",e:"jun@seasideinn.ph"}].map(s => <div key={s.n} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid "+C.border}}><div><div style={{fontSize:14,fontWeight:600,color:C.text}}>{s.n}</div><div style={{fontSize:11,color:C.textLight}}>{s.e}</div></div><Badge text={s.r} color={C.primaryLight}/></div>)}
        <div style={{marginTop:12}}><Btn small variant="outline">+ Add Staff</Btn></div>
      </div>
      <div style={{background:C.card,borderRadius:12,padding:24}}>
        <h4 style={{margin:"0 0 12px",fontSize:15,color:C.text}}>QR Code Generator</h4>
        <p style={{fontSize:12,color:C.textLight,margin:"0 0 16px"}}>Generate printable QR codes for rooms and common areas.</p>
        <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:16}}>
          {["Room 204","Room 118","Lobby","Pool Area"].map(r => <div key={r} style={{textAlign:"center",padding:12,background:C.bg,borderRadius:12,width:100}}><QRCode size={56}/><div style={{fontSize:10,fontWeight:600,color:C.text,marginTop:4}}>{r}</div></div>)}
        </div>
        <div style={{display:"flex",gap:8}}><Btn small>Generate All QR Codes</Btn><Btn small variant="ghost">Download as PDF</Btn></div>
      </div>
    </div>
  </Dash>;
}

function App() {
  const [screen, setScreen] = useState("guest-landing");
  const [issue, setIssue] = useState(null);
  const [lang, setLang] = useState("en");
  const navTo = id => { if(id==="feed")setScreen("staff-feed"); if(id==="sms")setScreen("staff-sms"); if(id==="analytics")setScreen("staff-analytics"); if(id==="settings")setScreen("staff-settings"); };
  const isG = screen.startsWith("guest");

  return <>
    {screen==="guest-landing" && <GuestLanding onNext={()=>setScreen("guest-feedback")} lang={lang} setLang={setLang}/>}
    {screen==="guest-feedback" && <GuestFeedback onNext={()=>setScreen("guest-confirm")} onBack={()=>setScreen("guest-landing")} lang={lang}/>}
    {screen==="guest-confirm" && <GuestConfirm onRestart={()=>setScreen("guest-landing")} lang={lang}/>}
    {screen==="staff-login" && <StaffLogin onNext={()=>setScreen("staff-feed")}/>}
    {screen==="staff-feed" && <LiveFeed onIssueClick={i=>{setIssue(i);setScreen("staff-detail");}} onNav={navTo}/>}
    {screen==="staff-detail" && issue && <IssueDetail issue={issue} onBack={()=>setScreen("staff-feed")} onNav={navTo}/>}
    {screen==="staff-sms" && <SMSPreview onNav={navTo}/>}
    {screen==="staff-analytics" && <AnalyticsScreen onNav={navTo}/>}
    {screen==="staff-settings" && <SettingsScreen onNav={navTo}/>}

    <div style={{position:"fixed",bottom:16,left:"50%",transform:"translateX(-50%)",background:"rgba(26,33,56,0.92)",borderRadius:28,padding:"5px 6px",display:"flex",gap:3,zIndex:999,backdropFilter:"blur(10px)"}}>
      <span onClick={()=>{setScreen("guest-landing");setLang("en");}} style={{padding:"7px 14px",borderRadius:20,fontSize:11,cursor:"pointer",fontWeight:isG?600:400,background:isG?"rgba(255,255,255,0.15)":"transparent",color:"#fff",whiteSpace:"nowrap"}}>📱 Guest</span>
      <span style={{width:1,background:"rgba(255,255,255,0.2)",margin:"4px 2px"}}/>
      {[{id:"staff-login",l:"🔐 Login"},{id:"staff-feed",l:"🔔 Feed"},{id:"staff-sms",l:"💬 SMS"},{id:"staff-analytics",l:"📊 Analytics"},{id:"staff-settings",l:"⚙️ Settings"}].map(s => <span key={s.id} onClick={()=>{setScreen(s.id);setIssue(null);}} style={{padding:"7px 14px",borderRadius:20,fontSize:11,cursor:"pointer",fontWeight:screen===s.id||(screen==="staff-detail"&&s.id==="staff-feed")?600:400,background:screen===s.id||(screen==="staff-detail"&&s.id==="staff-feed")?"rgba(255,255,255,0.15)":"transparent",color:"#fff",whiteSpace:"nowrap"}}>{s.l}</span>)}
    </div>
  </>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
